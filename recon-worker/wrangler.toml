name = "signal-recon"
main = "src/index.js"
compatibility_date = "2026-07-01"

# 07:00 ET. July = EDT = 11:00 UTC. Switch to "0 12 * * *" when DST ends in November.
[triggers]
crons = ["0 11 * * *"]

# Create with: wrangler kv namespace create SIGNAL_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "PASTE_KV_NAMESPACE_ID"

# Secrets (set via CLI, never committed):
#   wrangler secret put YT_API_KEY
#   wrangler secret put DISCORD_WEBHOOK_URL
#   wrangler secret put RUN_TOKEN        (any random string; guards manual GET /run)
